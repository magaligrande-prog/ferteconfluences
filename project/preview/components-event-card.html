<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;700&family=Montserrat:wght@500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #F3F3F3; padding: 24px; display: flex; gap: 20px; align-items: flex-end; }

  .event-card {
    width: 180px; height: 260px; border-radius: 20px; overflow: hidden;
    position: relative; flex-shrink: 0;
  }
  .event-card .bg { position: absolute; inset: 0; background-size: cover; background-position: center; }
  .event-card .scrim { position: absolute; inset: 0; background: rgba(90,61,0,0.3); }
  .event-card .gold-scrim {
    position: absolute; bottom: 0; left: 0; right: 0; height: 120px;
    background: linear-gradient(rgba(3,48,89,0) 0%, rgba(3,48,89,0.9) 100%);
  }
  .event-card .title-block {
    position: absolute; bottom: 16px; left: 0; right: 0;
    text-align: center; padding: 0 12px;
    text-shadow: 0px 0px 24px rgba(106,72,0,0.5);
  }
  .event-title { font-family: 'agenda', 'Nunito', sans-serif; font-weight: 700; font-size: 20px; line-height: 1.1; color: white; }
  .event-date  { font-size: 11px; font-weight: 500; color: rgba(255,255,255,0.9); margin-top: 4px; }

  .section-header { flex: 1; }
  .section-header h3 { font-family: 'agenda', 'Nunito', sans-serif; font-weight: 500; font-size: 32px; color: #575757; line-height: 1; margin-bottom: 4px; }
  .section-header p  { font-size: 12px; font-weight: 500; color: #AAAAAA; }
  .section-header small { display: block; font-size: 11px; color: #AAAAAA; margin-top: 12px; line-height: 1.5; }
</style>
<link rel="stylesheet" href="https://use.typekit.net/pox0ckd.css"><!-- ⚠️ Remplacez pox0ckd par votre identifiant de kit Adobe Fonts (fonts.adobe.com → Web Projects) -->
</head>
<body>

<div class="event-card">
  <div class="bg" style="background-color:#5b7fa6; background-image:url('../assets/images/marina.jpg');"></div>
  <div class="scrim"></div>
  <div class="gold-scrim"></div>
  <div class="title-block">
    <div class="event-title">Festival des 2 rivières</div>
    <div class="event-date">du 11 au 18 juin</div>
  </div>
</div>

<div class="event-card">
  <div class="bg" style="background-color:#7a6040; background-image:url('../assets/images/riverside.jpg');"></div>
  <div class="scrim"></div>
  <div class="gold-scrim"></div>
  <div class="title-block">
    <div class="event-title">Foire Paysanne</div>
    <div class="event-date">du 11 au 18 juin</div>
  </div>
</div>

<div class="event-card">
  <div class="bg" style="background-color:#3a5a7a; background-image:url('../assets/images/events.png'); background-position:30% center;"></div>
  <div class="scrim"></div>
  <div class="gold-scrim"></div>
  <div class="title-block">
    <div class="event-title">Triathlon de la Ferté</div>
    <div class="event-date">du 11 au 18 juin</div>
  </div>
</div>

<div class="section-header">
  <h3>Événements à la une</h3>
  <p>Un pur plaisir local</p>
  <small>3-column card grid, each 432×680px at full size.<br>Golden scrim + navy gradient at bottom.<br>Agenda display title + Montserrat date.</small>
</div>

</body>
</html>
