<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAFAFA; padding: 20px 24px; }
  .row { display: flex; gap: 6px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 6px; flex: 1; }
  .bar { background: #033059; border-radius: 3px; width: 100%; }
  .val  { font-size: 11px; font-weight: 700; color: #033059; }
  .name { font-size: 10px; font-weight: 500; color: #AAAAAA; }
</style>
</head>
<body>
<div class="row">
  <div class="item"><div class="bar" style="height:4px;"></div><div class="val">4</div><div class="name">--space-1</div></div>
  <div class="item"><div class="bar" style="height:8px;"></div><div class="val">8</div><div class="name">--space-2</div></div>
  <div class="item"><div class="bar" style="height:16px;"></div><div class="val">16</div><div class="name">--space-3</div></div>
  <div class="item"><div class="bar" style="height:24px;"></div><div class="val">24</div><div class="name">--space-4</div></div>
  <div class="item"><div class="bar" style="height:32px;"></div><div class="val">32</div><div class="name">--space-5</div></div>
  <div class="item"><div class="bar" style="height:48px;"></div><div class="val">48</div><div class="name">--space-6</div></div>
  <div class="item"><div class="bar" style="height:56px;"></div><div class="val">56</div><div class="name">--space-7</div></div>
  <div class="item"><div class="bar" style="height:64px;"></div><div class="val">64</div><div class="name">--space-8</div></div>
  <div class="item"><div class="bar" style="height:80px;"></div><div class="val">100</div><div class="name">--space-9</div></div>
</div>
</body>
</html>
