<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,600;1,700&family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAFAFA; display: flex; gap: 0; }

  .col { flex: 1; padding: 28px 24px; display: flex; flex-direction: column; gap: 12px; align-items: center; justify-content: center; }
  .col-dark { background: #033059; }
  .col-sky  { background: #D3E7F7; }
  .col-gold { background: #F4A700; }

  /* Logo lockup */
  .logo { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .logo-main { display: flex; align-items: center; gap: 6px; }
  .logo-anchor { width: 36px; height: 36px; }
  .logo-ferte { font-family:'agenda', 'Nunito', sans-serif; font-style:italic; font-weight:700; font-size:28px; line-height:1; }
  .logo-confluences { font-family:'agenda', 'Nunito', sans-serif; font-weight:600; font-size:22px; line-height:1; }
  .logo-sub { font-family:'Montserrat',sans-serif; font-weight:700; font-size:8px; letter-spacing:0.12em; text-transform:uppercase; opacity:0.7; margin-top:2px; }

  .version-label { font-size: 10px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }
</style>
<link rel="stylesheet" href="https://use.typekit.net/pox0ckd.css"><!-- ⚠️ Remplacez pox0ckd par votre identifiant de kit Adobe Fonts (fonts.adobe.com → Web Projects) -->
</head>
<body>

<!-- On navy -->
<div class="col col-dark">
  <div class="logo">
    <div class="logo-main">
      <svg class="logo-anchor" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="10" r="3.5" stroke="white" stroke-width="2"/>
        <line x1="18" y1="2" x2="18" y2="7" stroke="white" stroke-width="2"/>
        <line x1="18" y1="13" x2="18" y2="30" stroke="white" stroke-width="2"/>
        <path d="M8 30 Q18 22 28 30" stroke="white" stroke-width="2" fill="none"/>
        <line x1="8" y1="30" x2="4" y2="28" stroke="white" stroke-width="2"/>
        <line x1="28" y1="30" x2="32" y2="28" stroke="white" stroke-width="2"/>
        <path d="M10 19 H26" stroke="white" stroke-width="2"/>
      </svg>
      <div>
        <div style="display:flex;align-items:baseline;gap:4px;">
          <span class="logo-ferte" style="color:white;">Ferté</span>
          <span class="logo-confluences" style="color:white;">Confluences</span>
        </div>
      </div>
    </div>
    <div class="logo-sub" style="color:white;">Port loisirs de la Marne</div>
  </div>
  <div class="version-label" style="color:rgba(255,255,255,0.4);">Version marine</div>
</div>

<!-- On white -->
<div class="col" style="background:white; border:1px solid #E3E3E3;">
  <div class="logo">
    <div class="logo-main">
      <svg class="logo-anchor" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="10" r="3.5" stroke="#033059" stroke-width="2"/>
        <line x1="18" y1="2" x2="18" y2="7" stroke="#033059" stroke-width="2"/>
        <line x1="18" y1="13" x2="18" y2="30" stroke="#033059" stroke-width="2"/>
        <path d="M8 30 Q18 22 28 30" stroke="#033059" stroke-width="2" fill="none"/>
        <line x1="8" y1="30" x2="4" y2="28" stroke="#033059" stroke-width="2"/>
        <line x1="28" y1="30" x2="32" y2="28" stroke="#033059" stroke-width="2"/>
        <path d="M10 19 H26" stroke="#033059" stroke-width="2"/>
      </svg>
      <div>
        <div style="display:flex;align-items:baseline;gap:4px;">
          <span class="logo-ferte" style="color:#033059;">Ferté</span>
          <span class="logo-confluences" style="color:#033059;">Confluences</span>
        </div>
      </div>
    </div>
    <div class="logo-sub" style="color:#033059;">Port loisirs de la Marne</div>
  </div>
  <div class="version-label" style="color:#AAAAAA;">Version standard</div>
</div>

<!-- On sky blue -->
<div class="col col-sky">
  <div class="logo">
    <div class="logo-main">
      <svg class="logo-anchor" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="10" r="3.5" stroke="#033059" stroke-width="2"/>
        <line x1="18" y1="2" x2="18" y2="7" stroke="#033059" stroke-width="2"/>
        <line x1="18" y1="13" x2="18" y2="30" stroke="#033059" stroke-width="2"/>
        <path d="M8 30 Q18 22 28 30" stroke="#033059" stroke-width="2" fill="none"/>
        <line x1="8" y1="30" x2="4" y2="28" stroke="#033059" stroke-width="2"/>
        <line x1="28" y1="30" x2="32" y2="28" stroke="#033059" stroke-width="2"/>
        <path d="M10 19 H26" stroke="#033059" stroke-width="2"/>
      </svg>
      <div>
        <div style="display:flex;align-items:baseline;gap:4px;">
          <span class="logo-ferte" style="color:#033059;">Ferté</span>
          <span class="logo-confluences" style="color:#033059;">Confluences</span>
        </div>
      </div>
    </div>
    <div class="logo-sub" style="color:#033059;">Port loisirs de la Marne</div>
  </div>
  <div class="version-label" style="color:#033059; opacity:0.4;">Version ciel</div>
</div>

<!-- On gold -->
<div class="col col-gold">
  <div class="logo">
    <div class="logo-main">
      <svg class="logo-anchor" viewBox="0 0 36 36" fill="none">
        <circle cx="18" cy="10" r="3.5" stroke="#033059" stroke-width="2"/>
        <line x1="18" y1="2" x2="18" y2="7" stroke="#033059" stroke-width="2"/>
        <line x1="18" y1="13" x2="18" y2="30" stroke="#033059" stroke-width="2"/>
        <path d="M8 30 Q18 22 28 30" stroke="#033059" stroke-width="2" fill="none"/>
        <line x1="8" y1="30" x2="4" y2="28" stroke="#033059" stroke-width="2"/>
        <line x1="28" y1="30" x2="32" y2="28" stroke="#033059" stroke-width="2"/>
        <path d="M10 19 H26" stroke="#033059" stroke-width="2"/>
      </svg>
      <div>
        <div style="display:flex;align-items:baseline;gap:4px;">
          <span class="logo-ferte" style="color:#033059;">Ferté</span>
          <span class="logo-confluences" style="color:#033059;">Confluences</span>
        </div>
      </div>
    </div>
    <div class="logo-sub" style="color:#033059;">Port loisirs de la Marne</div>
  </div>
  <div class="version-label" style="color:#033059; opacity:0.4;">Version dorée</div>
</div>

</body>
</html>
