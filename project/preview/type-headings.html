<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,500;0,700;1,700&family=Montserrat:ital,wght@0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAFAFA; padding: 24px 28px; }
  .row { display: flex; flex-direction: column; gap: 10px; }
  .item { display: flex; align-items: baseline; gap: 16px; border-bottom: 1px solid #E3E3E3; padding-bottom: 10px; }
  .item:last-child { border-bottom: none; padding-bottom: 0; }
  .label { font-size: 10px; font-weight: 700; color: #AAAAAA; text-transform: uppercase; letter-spacing: 0.06em; width: 56px; flex-shrink: 0; }
  .note  { font-size: 10px; font-weight: 500; color: #AAAAAA; margin-left: auto; flex-shrink: 0; }
</style>
<link rel="stylesheet" href="https://use.typekit.net/pox0ckd.css"><!-- ⚠️ Remplacez pox0ckd par votre identifiant de kit Adobe Fonts (fonts.adobe.com → Web Projects) -->
</head>
<body>
<div class="row">
  <div class="item">
    <div class="label">Hero</div>
    <div style="font-family:'agenda', 'Nunito', sans-serif; font-weight:700; font-style:italic; font-size:52px; line-height:1; color:#033059; letter-spacing:-0.02em;">Bienvenue</div>
    <div class="note">Nunito (→ Agenda) 100px italic bold</div>
  </div>
  <div class="item">
    <div class="label">H1</div>
    <div style="font-family:'agenda', 'Nunito', sans-serif; font-weight:700; font-size:38px; line-height:1; color:#033059;">Activités & loisirs</div>
    <div class="note">Nunito (→ Agenda) 56px medium</div>
  </div>
  <div class="item">
    <div class="label">H2</div>
    <div style="font-family:'agenda', 'Nunito', sans-serif; font-weight:500; font-size:30px; line-height:1; color:#575757;">Événements à la une</div>
    <div class="note">Nunito (→ Agenda) 48px medium</div>
  </div>
  <div class="item">
    <div class="label">H3</div>
    <div style="font-family:'Montserrat',sans-serif; font-weight:700; font-size:22px; line-height:1.1; color:#033059;">Notre vision des Confluences</div>
    <div class="note">Montserrat 32px semibold</div>
  </div>
  <div class="item">
    <div class="label">H4</div>
    <div style="font-family:'Montserrat',sans-serif; font-weight:700; font-size:18px; line-height:1.1; color:#033059;">Port de plaisance remarquable</div>
    <div class="note">Montserrat 24px semibold</div>
  </div>
</div>
</body>
</html>
