<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Montserrat', sans-serif; background: #FAFAFA; padding: 24px; }
  .row { display: flex; gap: 10px; }
  .swatch { flex: 1; border-radius: 10px; overflow: hidden; }
  .color-block { height: 64px; }
  .info { padding: 8px 10px; background: white; }
  .name { font-size: 11px; font-weight: 700; color: #033059; }
  .hex  { font-size: 10px; font-weight: 500; color: #717680; margin-top: 2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="color-block" style="background:#575757;"></div>
    <div class="info"><div class="name">Gris foncé</div><div class="hex">#575757</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#AAAAAA;"></div>
    <div class="info"><div class="name">Gris moyen</div><div class="hex">#AAAAAA</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#E3E3E3;"></div>
    <div class="info"><div class="name">Gris clair</div><div class="hex">#E3E3E3</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#FAFAFA; border:1px solid #E3E3E3;"></div>
    <div class="info"><div class="name">Fond</div><div class="hex">#FAFAFA</div></div>
  </div>
  <div class="swatch">
    <div class="color-block" style="background:#5A3D00;"></div>
    <div class="info"><div class="name">Or foncé</div><div class="hex">#5A3D00</div></div>
  </div>
</div>
</body>
</html>
